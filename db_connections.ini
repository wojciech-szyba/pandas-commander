; db_connections.ini — target databases for running .sql files with Ctrl+R.
;
; Each section is a named connection. The [default] section is used unless
; the SQL file contains a line like:   -- connection: name
;
; Any RDBMS supported by SQLAlchemy works — set `url` to any SQLAlchemy URL:
;   https://docs.sqlalchemy.org/en/20/core/engines.html#database-urls
; (remember to install the matching driver, e.g. psycopg2, pymysql, ...)
;
; Uncomment and adjust one of the examples below to configure a database:
;
[default]
url = sqlite:///example.db
;
; [postgres]
; url = postgresql+psycopg2://user:password@localhost:5432/dbname
;
; [mysql]
; drivername = mysql+pymysql
; username = user
; password = secret
; host = localhost
; port = 3306
; database = dbname
;
; [mssql]
; url = mssql+pyodbc://user:password@localhost:1433/dbname?driver=ODBC+Driver+18+for+SQL+Server
;
; [oracle]
; url = oracle+oracledb://user:password@localhost:1521/?service_name=orclpdb1
